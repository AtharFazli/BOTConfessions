<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOTConfessions</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#0c0c12;color:#f0f0f8;min-height:100vh;display:flex;justify-content:center}
.container{max-width:640px;width:100%;padding:24px;padding-top:48px}
h1{font-size:1.8rem;font-weight:700;color:#ec5c6b;margin-bottom:2px}
.sub{color:#8888a0;font-size:.85rem;margin-bottom:24px;line-height:1.5}
#status{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;font-size:.82rem;margin-bottom:16px}
#status::before{content:'';width:8px;height:8px;border-radius:50%;flex-shrink:0}
#status.off{background:#1c0e12;color:#f87171}
#status.off::before{background:#f87171}
#status.on{background:#0e1c12;color:#4ade80}
#status.on::before{background:#4ade80}
textarea{width:100%;padding:12px 14px;border:1px solid #222233;border-radius:10px;background:#16161f;color:#f0f0f8;font-size:.92rem;resize:vertical;min-height:88px;margin-bottom:12px;transition:border-color .2s,box-shadow .2s}
textarea::placeholder{color:#7c7c94}
textarea:focus{outline:none;border-color:#7c5cfc;box-shadow:0 0 0 3px rgba(124,92,252,.15)}
button{padding:9px 18px;border:none;border-radius:8px;font-size:.88rem;font-weight:500;cursor:pointer;transition:all .15s}
.btn-primary{background:#ec5c6b;color:#fff}
.btn-primary:hover{background:#d94d5c}
.btn-primary:active{transform:scale(.97)}
.btn-primary:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-small{background:#222233;color:#b0b0c8;padding:7px 14px;font-size:.8rem}
.btn-small:hover{background:#2a2a40}
.actions{display:flex;gap:8px;margin-bottom:24px;align-items:center}
#list{display:flex;flex-direction:column;gap:10px}
.card{background:#16161f;border:1px solid #1e1e2e;border-radius:12px;padding:16px;transition:border-color .2s;animation:cardIn .35s ease-out both}
.card:hover{border-color:#2a2a40}
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card .msg{font-size:.92rem;line-height:1.55;margin-bottom:10px;word-break:break-word;color:#e0e0ec}
.card .meta{display:flex;justify-content:space-between;align-items:center}
.card .anon{font-size:.72rem;color:#55556a;background:#1a1a28;padding:3px 8px;border-radius:5px;text-transform:uppercase;letter-spacing:.5px}
.hearts{display:flex;align-items:center;gap:5px}
.hearts button{background:none;border:1px solid #2a2a40;border-radius:6px;color:#ec5c6b;padding:4px 10px;cursor:pointer;font-size:.82rem;transition:all .15s;line-height:1}
.hearts button:hover{border-color:#ec5c6b;background:#1c0e12}
.hearts button:active{transform:scale(.9)}
.hearts span{font-size:.85rem;color:#9999b0;min-width:1.2em;text-align:center}
.empty{text-align:center;color:#55556a;padding:48px 0;font-size:.9rem}
</style>
</head>
<body>
<div class="container">
  <h1>BOTConfessions</h1>
  <p class="sub">Anonymous on-chain confessions. 0.001 tBOT to post, 0.001 tBOT to heart.</p>
  <div id="status" class="off">Connect Wallet</div>
  <textarea id="input" placeholder="Write your confession... (keep it clean)"></textarea>
  <div class="actions">
    <button class="btn-primary" id="btnPost" disabled>Post (0.001 tBOT)</button>
    <button class="btn-small" id="btnRefresh">Refresh</button>
  </div>
  <div id="list"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/web3@1/dist/web3.min.js"></script>
<script>
const ABI = [
  {"inputs":[{"internalType":"string","name":"_message","type":"string"}],"name":"postConfession","outputs":[],"stateMutability":"payable","type":"function"},
  {"inputs":[{"internalType":"uint256","name":"_id","type":"uint256"}],"name":"heart","outputs":[],"stateMutability":"payable","type":"function"},
  {"inputs":[],"name":"getConfessions","outputs":[{"components":[{"internalType":"address","name":"author","type":"address"},{"internalType":"string","name":"message","type":"string"},{"internalType":"uint256","name":"timestamp","type":"uint256"},{"internalType":"uint256","name":"hearts","type":"uint256"}],"internalType":"struct BOTConfessions.Confession[]","name":"","type":"tuple[]"}],"stateMutability":"view","type":"function"},
  {"inputs":[],"name":"getCount","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
  {"anonymous":false,"inputs":[{"indexed":true,"internalType":"uint256","name":"id","type":"uint256"},{"indexed":true,"internalType":"address","name":"author","type":"address"}],"name":"NewConfession","type":"event"},
  {"anonymous":false,"inputs":[{"indexed":true,"internalType":"uint256","name":"id","type":"uint256"},{"indexed":true,"internalType":"address","name":"from","type":"address"}],"name":"HeartAdded","type":"event"}
];
const CONTRACT = "0x2983b7A9BE9EACE315a0cf6A368FA3D8DDb787F3"; // ponytail: replace after deploy

let web3, account, contract;

const $ = s => document.querySelector(s);
const statusEl = $('#status');
const inputEl = $('#input');
const btnPost = $('#btnPost');
const listEl = $('#list');

async function init() {
  if (!window.ethereum) { statusEl.textContent = 'Install MetaMask'; return; }
  web3 = new Web3(window.ethereum);
  try {
    let accounts = await window.ethereum.request({ method: 'eth_accounts' });
    if (!accounts || accounts.length === 0) {
      accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    }
    if (!accounts || !accounts[0]) { statusEl.textContent = 'No accounts'; return; }
    account = accounts[0];
    contract = new web3.eth.Contract(ABI, CONTRACT);
    statusEl.className = 'on';
    statusEl.textContent = 'Connected: ' + account.slice(0,6) + '...' + account.slice(-4);
    btnPost.disabled = false;
    loadList();
    window.ethereum.on('accountsChanged', ([a]) => { if (a) { account = a; location.reload(); } });
  } catch(e) {
    statusEl.textContent = e.code === 4001 ? 'Rejected by user' : (e.message || String(e));
  }
}

btnPost.onclick = async () => {
  const msg = inputEl.value.trim();
  if (!msg || !contract) return;
  btnPost.disabled = true;
  btnPost.textContent = 'Sending...';
  try {
    const opts = { from: account, value: '1000000000000000' };
    // ponytail: BOT Chain needs higher gas tip
    const maxFee = await web3.eth.getGasPrice();
    opts.maxPriorityFeePerGas = web3.utils.toWei('20', 'gwei');
    opts.maxFeePerGas = maxFee;
    await contract.methods.postConfession(msg).send(opts);
    inputEl.value = '';
    loadList();
  } catch(e) { alert('Failed: ' + (e.message || e)); }
  btnPost.disabled = false;
  btnPost.textContent = 'Post (0.001 tBOT)';
};

async function loadList() {
  if (!contract) return;
  try {
    const data = await contract.methods.getConfessions().call();
    listEl.innerHTML = data.length
      ? [...data].reverse().map((c,i) => `
        <div class="card" style="animation-delay:${i*40}ms">
          <div class="msg">${esc(c.message)}</div>
          <div class="meta">
            <span class="anon">Anon #${data.length - 1 - i}</span>
            <div class="hearts">
              <button onclick="heartify(${data.length - 1 - i})">♥</button>
              <span>${c.hearts}</span>
            </div>
          </div>
        </div>`).join('')
      : '<div class="empty">No confessions yet. Be the first!</div>';
  } catch(e) { listEl.innerHTML = '<div class="empty">Load failed.</div>'; }
}

async function heartify(id) {
  if (!contract) return;
  try {
    const opts = { from: account, value: '1000000000000000' };
    const maxFee = await web3.eth.getGasPrice();
    opts.maxPriorityFeePerGas = web3.utils.toWei('20', 'gwei');
    opts.maxFeePerGas = maxFee;
    await contract.methods.heart(id).send(opts); loadList(); }
  catch(e) { alert('Failed: ' + (e.message || e)); }
}

function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
$('#btnRefresh').onclick = loadList;
statusEl.style.cursor = 'pointer';
statusEl.onclick = init;
</script>
</body>
</html>
